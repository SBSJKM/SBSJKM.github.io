# Site
title: Fangmo's Blog
subtitle: Fangmo Liu
description: Fangmo's personel blog.
keywords:
  - AI
  - Robotics
  - Embodied AI
  - Personal Blog
author: Fangmo
language: zh-CN
timezone: Asia/Shanghai

url: https://sbsjkm.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults: null
pretty_urls:
  trailing_index: false
  trailing_html: false

# Source
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render: null

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: null
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false

# Home page
index_generator:
  path: ""
  per_page: 10
  order_by: -date

# Pagination
per_page: 10
pagination_dir: page

# Metadata
meta_generator: true
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Theme
theme: fluid

# Deployment is handled by GitHub Actions.
deploy: null
